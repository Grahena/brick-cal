<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>砖块计算器 Pro - 平方增强版</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-app: #f0f2f5;
    --bg-card: #ffffff;
    --text-main: #1d1d1f;
    --text-secondary: #86868b;
    --border-color: #d2d2d7;
    --accent: #c05a40; 
    --accent-hover: #a84e36;
    --accent-light: rgba(192, 90, 64, 0.08);
    --shadow-card: 0 8px 24px rgba(0,0,0,0.05);
    --ease: cubic-bezier(0.4, 0, 0.2, 1);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { background: var(--bg-app); font-family: 'Inter', system-ui, sans-serif; color: var(--text-main); line-height: 1.5; padding: 24px 16px 50px; }
  .app-container { max-width: 480px; margin: 0 auto; }
  header { margin-bottom: 28px; text-align: center; }
  .header-meta { display: flex; justify-content: center; gap: 8px; }
  .meta-tag { font-family: 'JetBrains Mono', monospace; font-size: 0.75rem; color: var(--accent); background: var(--accent-light); padding: 4px 12px; border-radius: 20px; font-weight: 500; }

  .card { background: var(--bg-card); border-radius: 20px; padding: 24px; margin-bottom: 20px; box-shadow: var(--shadow-card); border: 1px solid rgba(0,0,0,0.02); transition: transform 0.2s var(--ease); }
  .section-title { font-size: 1.1rem; font-weight: 700; color: var(--text-main); margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }
  .section-title::before { content: ''; width: 6px; height: 18px; background: var(--accent); border-radius: 3px; }

  .field { margin-bottom: 18px; }
  .field-label { display: block; font-size: 0.85rem; color: var(--text-secondary); margin-bottom: 8px; font-weight: 600; }
  
  select, input { width: 100%; padding: 14px 16px; border: 2px solid var(--border-color); border-radius: 12px; background: #fff; font-family: inherit; font-size: 1rem; color: var(--text-main); transition: all 0.2s var(--ease); outline: none; }
  select:focus, input:focus { border-color: var(--accent); box-shadow: 0 0 0 4px var(--accent-light); }

  .segmented-control { display: flex; background: #eee; padding: 4px; border-radius: 12px; margin-bottom: 18px; }
  .segment-btn { flex: 1; border: none; padding: 12px; border-radius: 9px; background: transparent; font-family: inherit; font-size: 0.85rem; font-weight: 600; color: var(--text-secondary); cursor: pointer; transition: all 0.2s var(--ease); }
  .segment-btn.active { background: #fff; color: var(--accent); box-shadow: 0 2px 8px rgba(0,0,0,0.1); }

  .result-box { margin-top: 24px; padding: 20px; background: #f9f9fb; border-radius: 16px; border: 1px solid #f0f0f2; display: none; animation: fadeIn 0.4s var(--ease); }
  .result-box.show { display: block; }
  .result-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; }
  .result-item { background: #fff; padding: 16px; border-radius: 12px; border: 1px solid #eee; }
  .result-item .key { font-size: 0.75rem; color: var(--text-secondary); margin-bottom: 4px; display: block; }
  .result-item .val { font-family: 'JetBrains Mono', monospace; font-size: 1.1rem; font-weight: 700; }

  .total-price-box { text-align: center; background: var(--accent-light); padding: 20px; border-radius: 12px; border: 1px solid rgba(192, 90, 64, 0.1); }
  .total-price-box .key { color: var(--accent); font-weight: 700; font-size: 0.9rem; }
  .total-price-box .val-lg { font-family: 'JetBrains Mono', monospace; font-size: 2rem; font-weight: 700; color: var(--accent); margin-top: 4px; }

  .tabs-header { display: flex; gap: 20px; border-bottom: 1px solid var(--border-color); margin-bottom: 20px; }
  .tab-item { padding: 12px 4px; font-size: 0.9rem; color: var(--text-secondary); cursor: pointer; position: relative; font-weight: 600; }
  .tab-item.active { color: var(--accent); }
  .tab-item.active::after { content: ''; position: absolute; bottom: -1px; left: 0; width: 100%; height: 3px; background: var(--accent); border-radius: 3px; }
  .tab-pane { display: none; }
  .tab-pane.active { display: block; }

  table { width: 100%; border-collapse: collapse; font-size: 0.8rem; }
  th, td { text-align: left; padding: 12px 8px; border-bottom: 1px solid #f0f0f2; }
  .del-btn { color: #ff3b30; border: 1px solid #ff3b30; background: transparent; padding: 4px 8px; border-radius: 6px; font-size: 0.75rem; cursor: pointer; }
  .btn-primary { width: 100%; padding: 16px; border: none; border-radius: 12px; cursor: pointer; font-family: inherit; font-weight: 700; background: var(--accent); color: white; margin-top: 10px; }
  
  @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
</style>
</head>
<body>

<div class="app-container">
  <header>
    <div class="header-meta">
      <span class="meta-tag" id="chip_price">--</span>
      <span class="meta-tag" id="chip_lifang">--</span>
    </div>
  </header>

  <div class="card">
    <div class="section-title">智能计算</div>

    <div class="field">
      <label class="field-label">1. 选择规格</label>
      <select id="specSelect" onchange="calculate()"></select>
    </div>

    <div class="field">
      <label class="field-label">2. 输入数据</label>
      <div class="segmented-control">
        <button class="segment-btn active" id="btn-pingfang" onclick="setMode('pingfang')">按平方</button>
        <button class="segment-btn" id="btn-jiashu" onclick="setMode('jiashu')">按架数</button>
        <button class="segment-btn" id="btn-kuaishu" onclick="setMode('kuaishu')">按块数</button>
      </div>
      <input type="number" id="inputVal" inputmode="decimal" placeholder="输入墙面平方数" oninput="calculate()">
    </div>

    <div class="result-box" id="resultBox">
      <div class="result-grid">
        <div class="result-item"><span class="key">需用架数</span><span class="val" id="r_jia">--</span></div>
        <div class="result-item"><span class="key">总块数</span><span class="val" id="r_kuai">--</span></div>
        <div class="result-item"><span class="key">单平米用砖</span><span class="val" id="r_persq">--</span></div>
        <div class="result-item"><span class="key">总体积 (m³)</span><span class="val" id="r_lifang">--</span></div>
      </div>
      <div class="total-price-box">
        <div class="key">预估金额</div>
        <div class="val-lg" id="r_total">¥ 0.00</div>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="tabs-header">
      <div class="tab-item active" onclick="switchTab(0)">规格列表</div>
      <div class="tab-item" onclick="switchTab(1)">价格设置</div>
    </div>
    <div class="tab-pane active" id="pane-0">
      <div style="max-height: 200px; overflow: auto;">
        <table>
          <thead><tr><th>规格</th><th>块/架</th><th>单块m³</th><th>操作</th></tr></thead>
          <tbody id="refBody"></tbody>
        </table>
      </div>
      <div style="margin-top:15px; border-top:1px dashed #ddd; padding-top:15px;">
        <input type="text" id="list_new_name" placeholder="名称(例:12×30×60)" style="margin-bottom:8px">
        <div style="display:flex; gap:8px">
          <input type="number" id="list_new_perJia" placeholder="块/架">
          <input type="number" id="list_new_perKuai" step="any" placeholder="单块立方">
        </div>
        <button class="btn-primary" style="padding:10px" onclick="addSpec()">添加规格</button>
      </div>
    </div>
    <div class="tab-pane" id="pane-1">
      <div class="field">
        <label class="field-label">单架价格 (元)</label>
        <input type="number" id="edit_price" oninput="saveGlobal()">
      </div>
      <div class="field">
        <label class="field-label">架立方标准 (仅显示)</label>
        <input type="number" id="edit_lifang" oninput="saveGlobal()">
      </div>
    </div>
  </div>
</div>

<script>
// 默认数据
let specs = [
  { name:'8×30×60',  perJia:120, perKuai:0.0144 },
  { name:'10×30×60', perJia:96,  perKuai:0.018  },
  { name:'12×30×60', perJia:80,  perKuai:0.0216 },
  { name:'15×30×60', perJia:64,  perKuai:0.027  },
  { name:'17×30×60', perJia:56,  perKuai:0.0306 },
  { name:'20×30×60', perJia:48,  perKuai:0.036  },
  { name:'24×30×60', perJia:40,  perKuai:0.0432 },
  { name:'10×24×60', perJia:120, perKuai:0.0144 },
  { name:'12×24×60', perJia:100, perKuai:0.01728 },
  { name:'20×24×60', perJia:60,  perKuai:0.0288 },
  { name:'24×24×60', perJia:50,  perKuai:0.03456 }
];
let globalPrice = 310;
let globalLifang = 1.728;
let mode = 'pingfang';

function init() {
  const sS = localStorage.getItem('brick_specs_v2');
  const sG = localStorage.getItem('brick_global_v2');
  if(sS) specs = JSON.parse(sS);
  if(sG) {
    const g = JSON.parse(sG);
    globalPrice = g.price;
    globalLifang = g.lifang;
  }
  updateUI();
  renderSelect();
  renderTable();
}

function updateUI() {
  document.getElementById('chip_price').textContent = `¥${globalPrice}/架`;
  document.getElementById('chip_lifang').textContent = `标准: ${globalLifang}m³`;
  document.getElementById('edit_price').value = globalPrice;
  document.getElementById('edit_lifang').value = globalLifang;
}

function setMode(m) {
  mode = m;
  ['pingfang', 'jiashu', 'kuaishu'].forEach(id => {
    document.getElementById('btn-' + id).classList.toggle('active', id === m);
  });
  const tips = { pingfang: '输入墙面平方数', jiashu: '输入架数', kuaishu: '输入块数' };
  document.getElementById('inputVal').placeholder = tips[m];
  calculate();
}

function calculate() {
  const val = parseFloat(document.getElementById('inputVal').value);
  const spec = specs[document.getElementById('specSelect').value];
  if (!val || !spec) {
    document.getElementById('resultBox').classList.remove('show');
    return;
  }

  let kuaishu, jiashu, persq = "--";

  // 尝试解析解析面积 (假设名称格式如 12×30×60)
  const dims = spec.name.split(/[×xX*]/);
  if (dims.length >= 2) {
    const h = parseFloat(dims[dims.length-2]) / 100; // 倒数第二个是高
    const l = parseFloat(dims[dims.length-1]) / 100; // 最后一个是长
    const oneArea = h * l;
    if (oneArea > 0) {
      persq = (1 / oneArea).toFixed(2);
      if (mode === 'pingfang') {
        kuaishu = Math.ceil(val / oneArea);
        jiashu = kuaishu / spec.perJia;
      }
    }
  }

  if (mode === 'jiashu') {
    jiashu = val;
    kuaishu = Math.round(jiashu * spec.perJia);
  } else if (mode === 'kuaishu') {
    kuaishu = val;
    jiashu = kuaishu / spec.perJia;
  }

  document.getElementById('r_jia').textContent = jiashu.toFixed(2);
  document.getElementById('r_kuai').textContent = kuaishu;
  document.getElementById('r_persq').textContent = persq + " 块/㎡";
  document.getElementById('r_lifang').textContent = (kuaishu * spec.perKuai).toFixed(3);
  document.getElementById('r_total').textContent = '¥ ' + (jiashu * globalPrice).toFixed(2);
  document.getElementById('resultBox').classList.add('show');
}

// 管理功能
function renderSelect() {
  document.getElementById('specSelect').innerHTML = specs.map((s, i) => `<option value="${i}">${s.name}</option>`).join('');
}
function renderTable() {
  document.getElementById('refBody').innerHTML = specs.map((s, i) => `
    <tr><td>${s.name}</td><td>${s.perJia}</td><td>${s.perKuai}</td>
    <td><button class="del-btn" onclick="delSpec(${i})">删</button></td></tr>`).join('');
}
function addSpec() {
  const n = document.getElementById('list_new_name').value;
  const j = parseInt(document.getElementById('list_new_perJia').value);
  const k = parseFloat(document.getElementById('list_new_perKuai').value);
  if(n && j && k) {
    specs.push({name:n, perJia:j, perKuai:k});
    saveAll();
    renderSelect();
    renderTable();
  }
}
function delSpec(i) {
  specs.splice(i, 1);
  saveAll();
  renderSelect();
  renderTable();
}
function saveGlobal() {
  globalPrice = parseFloat(document.getElementById('edit_price').value) || 0;
  globalLifang = parseFloat(document.getElementById('edit_lifang').value) || 0;
  saveAll();
  updateUI();
}
function saveAll() {
  localStorage.setItem('brick_specs_v2', JSON.stringify(specs));
  localStorage.setItem('brick_global_v2', JSON.stringify({price:globalPrice, lifang:globalLifang}));
}
function switchTab(idx) {
  document.querySelectorAll('.tab-item').forEach((t, i) => t.classList.toggle('active', i === idx));
  document.querySelectorAll('.tab-pane').forEach((p, i) => p.classList.toggle('active', i === idx));
}

init();
</script>
</body>
</html>
